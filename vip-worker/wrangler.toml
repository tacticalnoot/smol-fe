name = "vip-worker"
main = "src/index.ts"
compatibility_date = "2024-12-18"
node_compat = true

[vars]
VIP_TOKEN_TTL_SECONDS = 600
VIP_CHALLENGE_TTL_SECONDS = 300
VIP_HORIZON_URL = "https://horizon.stellar.org"

[durable_objects]
bindings = [
  { name = "VIP_ROOMS", class_name = "RoomsDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["RoomsDO"]
