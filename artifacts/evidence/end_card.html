<!DOCTYPE html>
<html>

<head>
    <style>

        }

        h1 {
            font-size: 80px;
            margin-bottom: 10px;

        }

        h2 {
            font-size: 40px;
            color: #94a3b8;
            font-weight: normal;
            margin-bottom: 60px;
        }

            background: #1e293b;
            padding: 40px;
            border-radius: 20px;

        }

        p {
            font-size: 28px;
            margin: 15px 0;
            color: #cbd5e1;
        }

        .highlight {
            color: #38bdf8;
            font-family: monospace;
