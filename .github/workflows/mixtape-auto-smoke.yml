name: Mixtape Auto Smoke

on:
  push:
    paths:
      - 'src/lib/mixtapeAuto.mjs'
      - 'tests/mixtape-auto.test.js'
      - '.github/workflows/mixtape-auto-smoke.yml'
  pull_request:
    paths:
      - 'src/lib/mixtapeAuto.mjs'
      - 'tests/mixtape-auto.test.js'
      - '.github/workflows/mixtape-auto-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Mixtape Auto unit test
        run: node --test tests/mixtape-auto.test.js
